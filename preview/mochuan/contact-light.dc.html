<!DOCTYPE html>

<body>

<style>
html,body{margin:0;padding:0;background:#FDFBF7;color:#1E2333;font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;-webkit-font-smoothing:antialiased}
a{color:#3D7BFF;text-decoration:none}a:hover{color:#6B9AFF}
::selection{background:rgba(61,123,255,.2)}
@keyframes gradFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes blobMorph{0%,100%{border-radius:58% 42% 55% 45%/50% 55% 45% 50%}50%{border-radius:45% 55% 42% 58%/55% 45% 55% 45%}}
@keyframes twk{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-4px) rotate(3deg)}}
@keyframes march{to{stroke-dashoffset:-12}}
@keyframes pulseR{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.8);opacity:0}}
</style>
<style id="mochuan-mobile">
@media (max-width:768px){
  html,body{overflow-x:hidden!important}
  img,video,svg{max-width:100%!important;height:auto}
  header,section{max-width:100%!important;padding-left:18px!important;padding-right:18px!important}
  header{padding-top:60px!important;padding-bottom:44px!important}
  section{padding-top:40px!important;padding-bottom:40px!important}
  nav{flex-wrap:wrap!important;gap:8px 14px!important;padding:12px 16px!important}
  footer{flex-direction:column!important;gap:14px!important;text-align:center;padding:28px 18px!important}
  h1{font-size:42px!important;line-height:1.15!important}
  h2{font-size:26px!important;line-height:1.25!important}
  [style*="repeat("]{grid-template-columns:1fr!important;gap:16px!important}
  [style*="gap: 64px"],[style*="gap:64px"]{gap:26px!important}
  [style*="gap: 36px"],[style*="gap:36px"]{gap:14px!important;flex-wrap:wrap!important}
  [style*="padding: 64px 48px"],[style*="padding:64px 48px"]{padding:34px 20px!important}
  [style*="padding: 36px 40px"],[style*="padding:36px 40px"]{padding:22px 18px!important}
}
</style>
</helmet>

          <g style="animation:bob 2.8s ease-in-out infinite">
            <path d="M66 44 L94 34 L84 58 L78 50 Z" style="stroke:#FF7A59"></path>

        <svg width="84" height="62" viewBox="0 0 100 74" style="fill:none;stroke:#17B8CE;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;display:block">

            <path d="M42 8 c11 0 19 8 19 18 c0 13 -19 34 -19 34 s-19 -21 -19 -34 c0 -10 8 -18 19 -18 Z"></path>

        <div style="font-size:14px;font-weight:700;color:#17B8CE;letter-spacing:.04em;margin-top:16px">协作方式 · REMOTE</div>
