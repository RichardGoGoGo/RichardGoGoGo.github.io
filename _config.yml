title: "浅译快报"
tagline: "AI艺术设计前沿"
description: "浅译万道实验室出品 — AI×艺术设计的洞察、征稿、SKILL评测与主题知识库"
url: "https://www.transwonder.top"
lang: zh-CN

markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - drafts
  - templates
  - prompts
  - STYLE-GUIDE.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude

defaults:
  # 资讯层
  - scope:
      path: "content/insights"
    values:
      layout: page
      category: insights
      permalink: /insights/:basename/
  - scope:
      path: "content/calls"
    values:
      layout: page
      category: calls
      permalink: /calls/:basename/
  - scope:
      path: "content/skills"
    values:
      layout: page
      category: skills
      permalink: /skills/:basename/
  # 知识层
  - scope:
      path: "content/knowledge"
    values:
      layout: page
      category: knowledge
      permalink: /knowledge/:basename/
  # 沉淀层
  - scope:
      path: "content/workflows"
    values:
      layout: page
      category: workflows
      permalink: /workflows/:basename/
  - scope:
      path: "content/essays"
    values:
      layout: page
      category: essays
      permalink: /essays/:basename/
  - scope:
      path: "content/translations"
    values:
      layout: page
      category: translations
      permalink: /translations/:basename/
