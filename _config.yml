title: "浅译万道"
tagline: "方法与文章"
description: "学习知识沉淀库 — 方法论、工具教程、研究笔记与翻译文档"
url: "https://richardgogogo.github.io"
lang: zh-CN

markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - drafts
  - templates
  - prompts
  - STYLE-GUIDE.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude

collections:
  workflows:
    output: true
    permalink: /workflows/:name/
  essays:
    output: true
    permalink: /essays/:name/
  translations:
    output: true
    permalink: /translations/:name/
  resources:
    output: true
    permalink: /resources/:name/
  cases:
    output: true
    permalink: /cases/:name/
  collaboration:
    output: true
    permalink: /collaboration/:name/

defaults:
  - scope:
      path: "content/workflows"
    values:
      layout: page
      category: workflows
      permalink: /workflows/:basename/
  - scope:
      path: "content/essays"
    values:
      layout: page
      category: essays
      permalink: /essays/:basename/
  - scope:
      path: "content/translations"
    values:
      layout: page
      category: translations
      permalink: /translations/:basename/
  - scope:
      path: "content/resources"
    values:
      layout: page
      category: resources
      permalink: /resources/:basename/
  - scope:
      path: "content/cases"
    values:
      layout: page
      category: cases
      permalink: /cases/:basename/
  - scope:
      path: "content/collaboration"
    values:
      layout: page
      category: collaboration
      permalink: /collaboration/:basename/
