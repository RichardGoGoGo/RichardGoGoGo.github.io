title: "浅译万道"
tagline: "方法与文章"
description: "学习知识沉淀库 — 方法论、工具教程、研究笔记与翻译文档"
url: "https://richardgogogo.github.io"
lang: zh-CN

markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - drafts
  - templates
  - prompts
  - STYLE-GUIDE.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude

collections:
  workflows:
    output: true
    permalink: /workflows/:name/
  essays:
    output: true
    permalink: /essays/:name/
  translations:
    output: true
    permalink: /translations/:name/
  resources:
    output: true
    permalink: /resources/:name/

defaults:
  - scope:
      path: "content/workflows"
    values:
      layout: page
      collection: workflows
  - scope:
      path: "content/essays"
    values:
      layout: page
      collection: essays
  - scope:
      path: "content/translations"
    values:
      layout: page
      collection: translations
  - scope:
      path: "content/resources"
    values:
      layout: page
      collection: resources
