title: "浅译快报"
tagline: "AI艺术设计前沿"
description: "浅译万道实验室出品 — AI×艺术设计的洞察、征稿、SKILL评测与主题知识库"
url: "https://www.transwonder.top"
lang: zh-CN

markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 资讯层栏目改为 collection：不生成独立页（output:false），只在 feed/列表内联展示
collections:
  insights:
    output: false
  calls:
    output: false
  skills:
    output: false

exclude:
  - drafts
  - templates
  - prompts
  - STYLE-GUIDE.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude

defaults:
  # 资讯层 collection：仅设 category（不输出独立页，无需 layout/permalink）
  - scope:
      path: ""
      type: insights
    values:
      category: insights
  - scope:
      path: ""
      type: calls
    values:
      category: calls
  - scope:
      path: ""
      type: skills
    values:
      category: skills
  # 深度文章页（加更长版；独立页，不进资讯 feed——category 不是 insights）
  - scope:
      path: "content/deep"
    values:
      layout: page
      category: deep
      permalink: /deep/:basename/
  # 知识层
  - scope:
      path: "content/knowledge"
    values:
      layout: page
      category: knowledge
      permalink: /knowledge/:basename/
  # 沉淀层
  - scope:
      path: "content/workflows"
    values:
      layout: page
      category: workflows
      permalink: /workflows/:basename/
  - scope:
      path: "content/essays"
    values:
      layout: page
      category: essays
      permalink: /essays/:basename/
  - scope:
      path: "content/translations"
    values:
      layout: page
      category: translations
      permalink: /translations/:basename/
