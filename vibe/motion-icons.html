<style>
.mi{--tx:var(--ink);--sec:var(--ink-soft);--mut:var(--ink-mute);--acc:var(--accent);--stg:var(--rule-soft);--rl:var(--rule);margin-top:.4rem}
.mi-sronly{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* 筛选条（与动效图鉴同款 chips） */
.mi-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 14px}
.mi-filter{display:flex;flex-wrap:wrap;gap:7px}
.mi-chip{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-mute);background:none;border:1px solid var(--rule);
  border-radius:20px;padding:5px 13px;cursor:pointer;transition:color .15s,background .15s,border-color .15s}
.mi-chip:hover{color:var(--ink);border-color:var(--ink-mute)}
.mi-chip.on{color:var(--paper);background:var(--accent);border-color:var(--accent)}
.mi-hide{display:none!important}

/* 风格分区 */
.mi-sec-intro{font-size:13px;color:var(--ink-soft);line-height:1.7;margin:-4px 0 12px}
.mi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:6px}
.mi-empty{border:1px dashed var(--rule);border-radius:10px;padding:2rem 1rem;text-align:center;font-size:13px;color:var(--ink-mute);margin-bottom:6px}

/* 图标卡 */
.mi-card{border:1px solid var(--rule);border-radius:10px;overflow:hidden;background:var(--paper);cursor:pointer;text-align:left;
  padding:0;display:flex;flex-direction:column;width:100%;font-family:inherit;transition:border-color .15s,transform .2s cubic-bezier(.22,1,.36,1)}
.mi-card:hover{border-color:var(--ink-mute);transform:translateY(-2px)}
.mi-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.mi-stage{height:168px;overflow:hidden;background:var(--rule-soft);position:relative;display:flex;align-items:center;justify-content:center}
.mi-stage svg{width:150px;height:150px;display:block}
.mi-hint{position:absolute;right:8px;bottom:7px;font-size:10px;color:var(--ink-mute);opacity:0;transition:opacity .15s;pointer-events:none}
.mi-tinted .mi-hint{color:rgba(255,255,255,.92)}
.mi-card:hover .mi-hint{opacity:1}
.mi-txt{padding:8px 11px 11px;background:var(--paper);flex:1}
.mi-stage{flex:none}
.mi-zh{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.mi-en{font-size:12px;color:var(--ink-mute);margin-top:1px}
.mi-desc{font-size:12px;color:var(--ink-soft);line-height:1.5;margin-top:3px}

/* 弹窗 */
.mi-overlay{position:fixed;inset:0;z-index:200;background:rgba(20,24,40,.45);display:flex;align-items:flex-start;justify-content:center;
  padding:4vh 16px;overflow-y:auto}
.mi-overlay[hidden]{display:none}
.mi-modal{position:relative;background:var(--paper);border:1px solid var(--rule);border-radius:14px;max-width:640px;width:100%;
  padding:20px 22px 22px;margin-bottom:4vh}
.mi-close{position:absolute;top:10px;right:12px;width:32px;height:32px;border:none;background:none;font-size:22px;line-height:1;
  color:var(--ink-mute);cursor:pointer;border-radius:8px;z-index:1}
.mi-close:hover{color:var(--ink);background:var(--rule-soft)}
.mi-m-stage{height:250px;border-radius:10px;background:var(--rule-soft);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.mi-m-stage svg{width:230px;height:230px;display:block}
.mi-m-head{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.mi-m-zh{font-size:18px;font-weight:600;color:var(--ink)}
.mi-m-en{font-size:13px;color:var(--ink-mute)}
.mi-m-style{font-size:11px;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:1px 9px}
.mi-m-sec{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--ink-mute);margin:16px 0 8px}
.mi-swatches{display:flex;flex-wrap:wrap;gap:7px}
.mi-swatch{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:8px;padding:4px 9px;
  font-size:11.5px;color:var(--ink-soft)}
.mi-swatch i{width:14px;height:14px;border-radius:4px;display:block;border:1px solid rgba(40,49,92,.12)}
.mi-swatch code{font-family:Consolas,Menlo,monospace;font-size:10.5px;color:var(--ink-mute)}
.mi-m-scenes{margin:0;padding-left:1.2em;font-size:13px;color:var(--ink-soft);line-height:1.9}
.mi-code-block{margin-top:14px;border:1px solid var(--rule);border-radius:10px;overflow:hidden}
.mi-code-head{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--rule-soft);
  font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-soft)}
.mi-copy{font-family:var(--sans);font-size:12px;color:var(--accent);background:none;border:1px solid var(--accent);
  border-radius:20px;padding:3px 12px;cursor:pointer;transition:background .15s}
.mi-copy:hover{background:var(--accent-soft)}
.mi-copy.ok{color:var(--paper);background:var(--accent)}
.mi-code-block pre{margin:0;padding:12px 14px;overflow-x:auto;max-height:260px;background:var(--paper)}
.mi-code-block code{font-family:Consolas,Menlo,monospace;font-size:12px;line-height:1.6;color:var(--ink);white-space:pre}

@media (prefers-reduced-motion:reduce){
  .mi svg *,.mi-m-stage svg *{animation:none!important}
  .mi-card,.mi-card:hover{transform:none}
}
</style>

<script>
(function(){
/* ============================================================

        zh/en: '中英文名',

   @media (prefers-reduced-motion:reduce) 静止规则（进场类需回填可见态）。

   ── 本系列（等距拟物）编排章法，源自 pixel2motion 方法论 ──
   人格令牌：enter=cubic-bezier(.22,1,.36,1) 软着陆；pop=cubic-bezier(.34,1.56,.64,1)

   三段式：① Reveal——按拖拽层级「投影/底座→主体→细节→点缀」交错进场，
   总长≤1.4s；② 操作循环(6s)——单焦点接力，先操作后结果，尾部悄悄复位；
   ③ Idle——整体 3.6s/±3px 悬浮，投影反相呼吸。
   属性分工：位移只给操作，颜色走 fill/stroke 补间；同元素两段动画共存时，
   进场终态必须是恒等变换，循环写在 animation 列表后位。

   板体厚度朝后左延伸，可见回边在「左端(中灰#D6E2EC)+顶边(浅灰#EDF2F8)」，
   往左上偏移 (-d,-d/2)；右侧不出现回边。落地斜面（底座/纸面/键盘）仍按
   S 角规则：S-W 左侧面中灰、E-S 右侧面最暗。
   注意 (-1,.5) 与 (1,-.5) 共线，地面两条轴只有 (1,.5) 和 (1,-.5)。

   升右立面上的圆 → 斜椭圆：rx=1.28r / ry=0.78r / rotate(-52°)
   （主轴取 MMᵀ 特征向量，朝右上；引出线沿立面法线 (1,.5) 向右下伸）。

   linejoin:round），别用圆帽粗线——那读作旋转而非透视。
   配色（自家糖果系）：舞台底 薰衣草#A091E4/蜜杏#ECA57E/豆沙绿#A6C097/
   雾蓝#8299BD/奶油黄#E2B963/玫瑰粉#DE8B9B；特征色 紫#8A7BE8/玫粉#EF7D8E/
   阳光黄#F5C05A/薄荷#58C2A9；结构深色 藏蓝#28315C 系。
   ============================================================ */

var STYLES=[
  { key:'iso', zh:'等距拟物 · 组装编排', en:'Isometric Assembly' }

var ICONS=[

      '巡览动的是卡片墙而不是放大镜——镜头固定、素材流过，读作"逐张检视"。',

    ],

idth="1.2" stroke-linecap="round" fill="none"/><path d="M43 49.5 l8 -4" stroke="#C9D6E5" stroke-width="1.5" stroke-linecap="round" fill="none"/></g>\n      <g class="e" style="animation-delay:.435s"><polygon class="a-hl1" points="56,47 70,40 70,30 56,37" fill="#F1F6FA" stroke="rgba(245,192,90,0)" stroke-width=".9"/><path d="M59 38.5 l6 -3" stroke="#A9BCD3" stroke-width="1.2" stroke-linecap="round" fill="none"/><path d="M59 41.5 l8 -4" stroke="#C9D6E5" stroke-width="1.5" stroke-linecap="round" fill="none"/></g>\n      <g class="e" style="animation-delay:.49s"><polygon points="24,50 38,43 38,33 24,40" fill="#F1F6FA"/><path d="M27 41.5 l6 -3" stroke="#A9BCD3" stroke-width="1.2" stroke-linecap="round" fill="none"/><path d="M27 44.5 l8 -4" stroke="#C9D6E5" stroke-width="1.5" stroke-linecap="round" fill="none"/></g>\n      <g class="e" style="animation-delay:.545s"><polygon points="40,42 54,35 54,25 40,32" fill="#F1F6FA"/><path d="M43 33.5 l6 -3" stroke="#A9BCD3" stroke-width="1.2" stroke-linecap="round" fill="none"/><path d="M43 36.5 l8 -4" stroke="#C9D6E5" stroke-width="1.5" stroke-linecap="round" fill="none"/></g>\n      <g class="e" style="animation-delay:.6s"><polygon points="56,34 70,27 70,17 56,24" fill="#F1F6FA"/><path d="M59 25.5 l6 -3" stroke="#A9BCD3" stroke-width="1.2" stroke-linecap="round" fill="none"/><path d="M59 28.5 l8 -4" stroke="#C9D6E5" stroke-width="1.5" stroke-linecap="round" fill="none"/></g>\n    </g>\n    <g class="e-pop" style="animation-delay:.72s">\n      <rect x="66.4" y="52" width="3.2" height="36" rx="1.6" fill="#FFFFFF"/>\n      <ellipse cx="68" cy="45" rx="16.6" ry="10.2" transform="rotate(-52 68 45)" fill="#FFFFFF" opacity=".22"/>\n      <g class="a-hint"><polygon points="61,51 74,44.5 74,34.5 61,41" fill="#FFFFFF"/><path d="M64 43.5 l6.5 -3.25" stroke="#A9BCD3" stroke-width="1.3" stroke-linecap="round" fill="none"/><path d="M64 46.5 l5 -2.5" stroke="#C9D6E5" stroke-width="1.3" stroke-linecap="round" fill="none"/></g>\n      <ellipse cx="68" cy="45" rx="16.6" ry="10.2" transform="rotate(-52 68 45)" fill="none" stroke="#FFFFFF" stroke-width="3"/>\n    </g>\n    <g class="e-pop" style="animation-delay:.88s">\n      <polygon points="80,88 90,93 80,98 70,93" fill="#222A4E"/>\n      <polygon points="80,98 70,93 70,96 80,101" fill="#1D2547"/>\n      <polygon points="90,93 80,98 80,101 90,96" fill="#141B36"/>\n      <path class="a-b1" d="M73.5 92.5 l5 2.5" stroke="#EF7D8E" stroke-width="1.7" stroke-linecap="round" opacity=".45" fill="none"/>\n      <path class="a-b2" d="M76 91 l5 2.5" stroke="#F5C05A" stroke-width="1.7" stroke-linecap="round" opacity=".45" fill="none"/>\n      <path d="M78.5 89.5 l5 2.5" stroke="#58C2A9" stroke-width="1.7" stroke-linecap="round" opacity=".9" fill="none"/>\n    </g>\n  </g>\n</svg>',
    css:'/* 人格令牌：enter=软着陆 / pop=轻overshoot(仅点缀件) / 循环 ease-in-out */\n.mi-i-iso-analysis .e{opacity:0;animation:a1-rise .55s cubic-bezier(.22,1,.36,1) both}\n.mi-i-iso-analysis .e-pop{opacity:0;transform-box:fill-box;transform-origin:50% 100%;animation:a1-pop .55s cubic-bezier(.34,1.56,.64,1) both}\n.mi-i-iso-analysis .a-float{animation:a1-float 3.6s ease-in-out infinite}\n.mi-i-iso-analysis .a-shadow{transform-box:fill-box;transform-origin:center;animation:a1-breath 3.6s ease-in-out infinite}\n.mi-i-iso-analysis .a-wall{animation:a1-scan 6s ease-in-out 1.8s infinite}\n.mi-i-iso-analysis .a-hl1{animation:a1-hl1 6s ease-in-out 1.8s infinite}\n.mi-i-iso-analysis .a-hl2{animation:a1-hl2 6s ease-in-out 1.8s infinite}\n.mi-i-iso-analysis .a-hint{opacity:0;animation:a1-hint 6s ease-in-out 1.8s infinite}\n.mi-i-iso-analysis .a-b1{animation:a1-b1 6s ease-in-out 1.8s infinite}\n.mi-i-iso-analysis .a-b2{animation:a1-b2 6s ease-in-out 1.8s infinite}\n@keyframes a1-rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}\n@keyframes a1-pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}\n@keyframes a1-float{0%,100%{transform:none}50%{transform:translateY(-3px)}}\n@keyframes a1-breath{0%,100%{transform:scale(1);opacity:.18}50%{transform:scale(.9);opacity:.12}}\n@keyframes a1-scan{0%{transform:none}14%,30%{transform:translate(-7px,3.5px)}48%,64%{transform:translate(7px,-3.5px)}82%,100%{transform:none}}\n@keyframes a1-hl1{0%,12%,34%,100%{fill:#F1F6FA;stroke:rgba(245,192,90,0)}17%,28%{fill:#FFFFFF;stroke:#F5C05A}}\n@keyframes a1-hl2{0%,46%,68%,100%{fill:#F1F6FA;stroke:rgba(245,192,90,0)}51%,62%{fill:#FFFFFF;stroke:#F5C05A}}\n@keyframes a1-hint{0%,13%,33%,47%,67%,100%{opacity:0}17%,28%{opacity:.95}51%,62%{opacity:.95}}\n@keyframes a1-b1{0%,20%,40%,100%{opacity:.45}26%,32%{opacity:1}}\n@keyframes a1-b2{0%,54%,74%,100%{opacity:.45}60%,66%{opacity:1}}\n@media (prefers-reduced-motion:reduce){.mi-i-iso-analysis *{animation:none!important}.mi-i-iso-analysis .e,.mi-i-iso-analysis .e-pop{opacity:1}}'

  {
    id:'iso-concept', style:'iso',
    zh:'概念', en:'Concept',

/* ============================================================
   框架区（渲染 / 筛选 / 弹窗 / 复制 / 悬停重播）——加内容不用动这里
   ============================================================ */

var root=document.querySelector('.mi'); if(!root) return;
var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;

/* 汇总注入所有图标的动画 CSS（页面演示与代码块共用同一份源码） */
var styleEl=document.createElement('style');
styleEl.textContent=ICONS.map(function(i){return i.css;}).join('\n');
document.head.appendChild(styleEl);

/* 悬停重播：整体替换 svg 节点，重跑进场编排 */
function bindReplay(stageEl,icon){
  stageEl.addEventListener('mouseenter',function(){
    if(reduce) return;
    var now=Date.now();
    if(stageEl._t&&now-stageEl._t<2500) return;
    stageEl._t=now;
    var old=stageEl.querySelector('svg');
    if(!old) return;
    var tmp=document.createElement('div'); tmp.innerHTML=icon.svg;
    stageEl.replaceChild(tmp.firstElementChild,old);
  });
}

/* 渲染分区与卡片 */
var secWrap=document.getElementById('mi-sections');
STYLES.forEach(function(s){
  var label=document.createElement('div');
  label.className='sec-label'; label.setAttribute('data-cat',s.key);
  label.textContent=s.zh+' · '+s.en;
  secWrap.appendChild(label);

  if(s.intro){
    var intro=document.createElement('p');
    intro.className='mi-sec-intro'; intro.setAttribute('data-cat',s.key);
    intro.textContent=s.intro;
    secWrap.appendChild(intro);
  }

  var items=ICONS.filter(function(i){return i.style===s.key;});
  if(!items.length){
    var empty=document.createElement('div');
    empty.className='mi-empty'; empty.setAttribute('data-cat',s.key);
    empty.textContent='该系列筹备中';
    secWrap.appendChild(empty);
    return;
  }
  var grid=document.createElement('div');
  grid.className='mi-grid'; grid.setAttribute('data-cat',s.key);
  items.forEach(function(icon){
    var card=document.createElement('button');
    card.type='button'; card.className='mi-card'; card.setAttribute('data-id',icon.id);
    card.innerHTML='<span class="mi-stage">'+icon.svg+'<span class="mi-hint">点开看配色与场景</span></span>'
      +'<span class="mi-txt" style="display:block"><span class="mi-zh" style="display:block"></span>'
      +'<span class="mi-en" style="display:block"></span><span class="mi-desc" style="display:block"></span></span>';
    card.querySelector('.mi-zh').textContent=icon.zh;
    card.querySelector('.mi-en').textContent=icon.en;
    card.querySelector('.mi-desc').textContent=icon.desc;
    var st=card.querySelector('.mi-stage');
    if(icon.bg){st.style.background=icon.bg;st.classList.add('mi-tinted');card.style.background=icon.bg;}
    bindReplay(st,icon);
    card.addEventListener('click',function(){openModal(icon);});
    grid.appendChild(card);
  });
  secWrap.appendChild(grid);
});

/* 筛选 chips */
var filterWrap=document.getElementById('mi-filter');
var cats=[{key:'all',zh:'全部'}].concat(STYLES);
cats.forEach(function(c,idx){
  var b=document.createElement('button');
  b.type='button'; b.className='mi-chip'+(idx===0?' on':''); b.setAttribute('data-cat',c.key);
  b.setAttribute('aria-pressed',idx===0?'true':'false');
  b.textContent=c.zh;
  b.addEventListener('click',function(){
    [].forEach.call(filterWrap.children,function(x){x.classList.remove('on');x.setAttribute('aria-pressed','false');});
    b.classList.add('on'); b.setAttribute('aria-pressed','true');
    var cat=c.key;
    [].forEach.call(secWrap.children,function(el){
      var show=cat==='all'||el.getAttribute('data-cat')===cat;
      el.classList.toggle('mi-hide',!show);
    });
  });
  filterWrap.appendChild(b);
});

/* 弹窗 */
var overlay=document.getElementById('mi-overlay'),
    mStage=document.getElementById('mi-m-stage'),
    mZh=document.getElementById('mi-m-zh'), mEn=document.getElementById('mi-m-en'),
    mStyle=document.getElementById('mi-m-style'),
    mColors=document.getElementById('mi-m-colors'), mScenes=document.getElementById('mi-m-scenes'),
    closeBtn=document.getElementById('mi-close'), lastFocus=null;

function openModal(icon){
  var st=STYLES.filter(function(s){return s.key===icon.style;})[0];
  mStage.innerHTML=icon.svg;
  mStage.style.background=icon.bg||'';
  mStage.classList.toggle('mi-tinted',!!icon.bg);
  mZh.textContent=icon.zh; mEn.textContent=icon.en;
  mStyle.textContent=st?st.zh:icon.style;
  mColors.innerHTML='';
  (icon.colors||[]).forEach(function(c){
    var chip=document.createElement('span'); chip.className='mi-swatch';
    var sq=document.createElement('i'); sq.style.background=c[0];
    var t=document.createElement('span'); t.textContent=c[1]+' ';
    var hx=document.createElement('code'); hx.textContent=c[0].toUpperCase();
    chip.appendChild(sq); chip.appendChild(t); chip.appendChild(hx);
    mColors.appendChild(chip);
  });
  mScenes.innerHTML='';
  (icon.scenes||[]).forEach(function(s){
    var li=document.createElement('li'); li.textContent=s; mScenes.appendChild(li);
  });
  lastFocus=document.activeElement;
  overlay.hidden=false;
  document.body.style.overflow='hidden';
  closeBtn.focus();
}
function closeModal(){
  overlay.hidden=true;
  document.body.style.overflow='';
  if(lastFocus&&lastFocus.focus) lastFocus.focus();
}
closeBtn.addEventListener('click',closeModal);
overlay.addEventListener('click',function(e){ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&!overlay.hidden) closeModal(); });

})();
</script>
