<style>
.dfbs{--ease:cubic-bezier(.22,1,.36,1);--pop:cubic-bezier(.32,1.35,.5,1);
  font-family:"Noto Serif SC","Songti SC",serif;}
.dfbs-stage{position:relative;overflow:hidden;height:calc(100vh - 56px);min-height:540px;
  display:flex;flex-direction:column;
  background:#0b0c0f;color:#ECE6DA;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1300px 640px at 72% -14%, rgba(96,84,132,.15), transparent 60%),
    radial-gradient(1100px 560px at 8% 118%, rgba(38,92,110,.14), transparent 62%);}
.dfbs-grain{position:absolute;inset:0;pointer-events:none;opacity:.03;z-index:2;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
.dfbs-top{position:relative;z-index:6;display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;
  padding:30px clamp(24px,5vw,60px) 0;font-family:"Noto Serif SC",serif}
.dfbs-top .zh{font-size:clamp(20px,2.4vw,26px);letter-spacing:.02em;line-height:1.3}
.dfbs-top .en{font-family:"Inter","Noto Serif SC",sans-serif;font-size:11.5px;letter-spacing:.16em;color:#8f8a7e;margin-top:8px}
.dfbs-back{font-family:"Inter",sans-serif;font-size:12px;color:#8f8a7e;text-decoration:none;letter-spacing:.06em}
.dfbs-back:hover{color:#C9A24B}
.dfbs-shelfwrap{position:relative;flex:1;min-height:0}
.dfbs-shelves{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:clamp(24px,6vh,52px);width:100%}
.dfbs-shelf{position:relative;display:flex;align-items:flex-end;justify-content:center;gap:3px;
  perspective:2600px;perspective-origin:50% 46%}
.dfbs-shelf::after{content:"";position:absolute;left:-4%;right:-4%;bottom:-12px;height:18px;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.5),transparent 72%);filter:blur(6px)}
.dfbs .slot{position:relative;flex:0 0 auto}
.dfbs .slot:hover{z-index:20}
.dfbs .book{position:absolute;bottom:0;left:50%;width:var(--X);height:var(--Y);
  transform-style:preserve-3d;cursor:pointer;transform:translateX(-50%) rotateY(0deg);
  animation:dfbs-in .8s var(--pop) both;transition:filter .5s var(--ease)}
.dfbs .book.settled{animation:none;transform:translateX(-50%) rotateY(0deg);
  transition:transform .55s var(--ease),filter .5s var(--ease)}
.dfbs .slot:hover .book.settled:not(.sel){transform:translateX(-50%) translateY(-56px) rotateY(-32deg)}
.dfbs .book.sel{transform:translateX(-40%) translateY(-34px) rotateY(-74deg) scale(1.05);z-index:30}
.dfbs .book.dim{filter:brightness(.4) saturate(.7);opacity:.55}
@keyframes dfbs-in{0%{opacity:0;transform:translateX(-50%) translateY(165%) rotateY(-82deg)}
  46%{opacity:1}64%{transform:translateX(-50%) translateY(-7%) rotateY(-82deg)}
  100%{transform:translateX(-50%) translateY(0) rotateY(0deg)}}
.dfbs .face{position:absolute;overflow:hidden;backface-visibility:hidden}
.dfbs .spine{width:var(--X);height:var(--Y);transform:translateZ(calc(var(--Z)/2));
  background-size:100% 100%;background-position:center;
  box-shadow:inset -6px 0 14px rgba(0,0,0,.28),inset 0 0 0 1px rgba(255,255,255,.06)}
.dfbs .pback{width:var(--X);height:var(--Y);transform:translateZ(calc(var(--Z)/-2)) rotateY(180deg);
  background:repeating-linear-gradient(90deg,#efe8d8,#efe8d8 1.4px,#cfc7b3 1.4px,#cfc7b3 2.8px)}
.dfbs .cover{width:var(--Z);height:var(--Y);left:calc(var(--X)/2 - var(--Z)/2);
  transform:rotateY(90deg) translateZ(calc(var(--X)/2));border-radius:0 3px 3px 0;
  background-size:100% 100%;background-position:center;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.28),inset 22px 0 40px -20px rgba(0,0,0,.4)}
.dfbs .foreedge{width:var(--Z);height:var(--Y);left:calc(var(--X)/2 - var(--Z)/2);
  transform:rotateY(-90deg) translateZ(calc(var(--X)/2));
  background:repeating-linear-gradient(90deg,#efe8d8,#efe8d8 1.4px,#cfc7b3 1.4px,#cfc7b3 2.8px)}
.dfbs .toppg{width:var(--X);height:var(--Z);top:calc(var(--Y)/2 - var(--Z)/2);
  transform:rotateX(90deg) translateZ(calc(var(--Y)/2));
  background:repeating-linear-gradient(180deg,#f2ecdd,#f2ecdd 1.4px,#d4ccb8 1.4px,#d4ccb8 2.8px)}
.dfbs-hint{position:absolute;left:0;right:0;bottom:20px;text-align:center;font-size:11.5px;letter-spacing:.14em;
  color:#75716699;z-index:6;font-family:"Inter",sans-serif;transition:.4s var(--ease)}
.dfbs-hint kbd{display:inline-block;padding:2px 8px;margin:0 2px;border:1px solid #3a382f;border-radius:5px;color:#c9c0af;font-size:11px}
.dfbs.hasSel .dfbs-hint{opacity:0}
.dfbs-backdrop{position:fixed;inset:0;background:rgba(6,7,9,.45);opacity:0;pointer-events:none;transition:.5s var(--ease);z-index:40}
.dfbs.hasSel .dfbs-backdrop{opacity:1;pointer-events:auto}
.dfbs-drawer{position:fixed;top:0;right:0;height:100%;width:min(430px,86vw);z-index:50;
  background:linear-gradient(180deg,#141519,#101116);border-left:1px solid #26272c;color:#ECE6DA;
  transform:translateX(100%);transition:transform .6s var(--ease);
  padding:56px clamp(28px,3vw,44px);overflow-y:auto;box-shadow:-30px 0 80px rgba(0,0,0,.5)}
.dfbs.hasSel .dfbs-drawer{transform:translateX(0)}
.dfbs-close{position:absolute;top:22px;right:24px;width:34px;height:34px;border-radius:50%;
  border:1px solid #34342c;background:transparent;color:#c9c0af;cursor:pointer;font-size:16px;transition:.3s var(--ease)}
.dfbs-close:hover{background:#24252a}
.dfbs .dw-cover{width:148px;background-size:cover;background-position:center;border-radius:2px;
  margin-bottom:24px;box-shadow:0 16px 42px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06)}
.dfbs .dw-era{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:#8f8a7e;margin-bottom:16px}
.dfbs .dw-title{font-family:"Noto Serif SC",serif;font-size:34px;line-height:1.12;letter-spacing:.01em}
.dfbs .dw-author{margin-top:12px;font-size:13px;letter-spacing:.14em;color:#b3ac9d}
.dfbs .dw-rule{height:1px;background:linear-gradient(90deg,#3a382f,transparent);margin:26px 0}
.dfbs .dw-quote{font-family:"Noto Serif SC",serif;font-size:19px;line-height:1.6;font-weight:600;color:#EFE7D4}
.dfbs .dw-blurb{margin-top:20px;font-size:14px;line-height:2;color:#c4bdac;text-align:justify}
.dfbs .dw-bio{margin-top:22px;font-size:12.5px;line-height:1.8;color:#8f8a7e;padding-left:14px;border-left:2px solid #34342c}
.dfbs .dw-meta{margin-top:30px;display:flex;gap:26px;font-size:11px;color:#75716e;font-family:"Inter",monospace;letter-spacing:.05em}
.dfbs .dw-meta b{display:block;color:#c9c0af;font-size:13px;margin-top:3px;font-family:inherit}
.dfbs .dw-storyblock{margin-top:30px;padding:18px 18px 20px;border:1px solid #2c2d33;border-radius:10px;background:rgba(201,162,75,.055)}
.dfbs .dw-story-label{font-family:"Inter",sans-serif;font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:#C9A24B;margin-bottom:10px}
.dfbs .dw-story-title{font-family:"Noto Serif SC",serif;font-size:19px;font-weight:600;color:#EFE7D4;line-height:1.4}
.dfbs .dw-story-desc{margin-top:10px;font-size:13px;line-height:1.9;color:#b3ac9d;text-align:justify}
.dfbs .dw-story{display:inline-block;margin-top:16px;font-family:"Inter","Noto Serif SC",sans-serif;font-size:13px;letter-spacing:.04em;
  color:#0b0c0f;background:#C9A24B;border-radius:8px;padding:.6rem 1.15rem;text-decoration:none;transition:.25s var(--ease);line-height:1.4}
.dfbs .dw-story:hover{background:#e0b85e;transform:translateX(3px)}
@media (prefers-reduced-motion:reduce){.dfbs .book{animation:none}}
</style>

<script src="{{ '/assets/df2026/books-data.js' | relative_url }}"></script>
<script>
(function(){
  // 各同学「互动故事」：按书目编号 no 填 {work 作品名, url 网站, story 简介}。未填的书不显示互动故事块。
  var DF_STORIES = {
    11: {work:"光复路21号", url:"https://zippy-kangaroo-451d65.netlify.app/",
      story:"一场无法获胜的战争，一段无法遗忘的往事，一封无法抵达的家书。"},
    12: {work:"“孺子牛”的左联十年 · A willing servant's fight in Qiejieting", url:"https://scarlettthewind.github.io/particle-effect/",
      story:"本页面展现了 1933 至 1936 年，鲁迅居于上海大陆新村，于小楼三层分设会客、写作、居家空间，兼顾左翼文艺接引、文字战斗与家庭温情。走出弄堂，鲁迅依托内山书店、左联阵地开展革命文艺工作，在白色恐怖下以笔抗争、联络进步力量直至 1936 年辞世，其精神风骨永留上海这片弄堂。"},
    17: {work:"一个人的画廊", url:"https://b6b8af4b00d64d6b8550c559c3066ba9.app.codebuddy.work",
      story:"五段人生记忆嵌于墙垣，四扇金色门廊通向可触碰的房间。在粒子与光的流动中，一个人一生的来路与归途，缓缓显形。"},
    21: {work:"褶皱里的人间", url:"https://wxa0322-d7gs63jls23fb1173-1450509572.tcloudbaseapp.com",
      story:"当城市不断向上生长，那些藏在褶皱里的人间从未消失。滚动小球、点亮空间，在九个微缩场景中触摸普通人的日常。"},
    25: {work:"情绪收银台", url:"https://jolly-froyo-df8894.netlify.app/",
      story:"在高速城市节奏中，情绪修复被商品化，人们通过“消费性解压”持续缓冲压力，却逐渐失去真正恢复的能力。"},
    29: {work:"同址 异时", url:"https://csy-particle-viewer.jet-brazil.workers.dev/",
      story:"上海杨浦区。同一个地点，不同的时间。"},
    31: {work:"环中追逐的影子", url:"https://nalqlan.github.io/metro-shadow/",
      story:"无限循环的地下列车穿过楼栋，在车窗中闪过少年少女陌生的映像。追逐的从来不是眼前人，而是视网膜上的影子。"},
    32: {work:"剧场与目光", url:"https://1822ade07ab345a4997edfc8a3c580c6.app.codebuddy.work/",
      story:"粒子构筑的微缩剧场中，看与被看不断交换。阿珍与阿强在亚洲大厦的一天，揭示我们始终在审视别人，而自己也在被凝视。"},
    36: {work:"效率的囚徒", url:"https://bbd4d0ae505645e6be65eec91d75b762.app.codebuddy.work",
      story:"在未来的上海，随着技术与资本发展，高效观念深入生活，每个人的生活被量化成数字，越来越追求数据上的成就与纸面荣誉。主角顾言进入一家公司面试，个人终端上能看见他人的成就值，随之陷入效率追逐的竞赛……"},
    38: {work:"偏航之树", url:"https://yanxiuguo35.github.io/TREE-OF-DRIFT/",
      story:"在粒子构成的数据之树中经历两条相反的人生轨迹，随着每一次选择，树的粒子状态、光影与生命节奏不断变化。当算法不断优化生活时，人类是否还能保留停留、偏航与偶然相遇的自由……"}
  };
  var BOOKS=(window.ICON_BOOKS||[]).slice().sort((a,b)=>a.no-b.no);
  var shelves=document.getElementById('dfbs-shelves');
  var wrap=document.querySelector('.dfbs'); if(!shelves||!wrap) return;
  var g=id=>document.getElementById(id);
  var isMobile=()=>window.innerWidth<640;
  var img=p=>isMobile()?p.replace('/covers/','/covers/mobile/').replace('/spines/','/spines/mobile/'):p;
  var rowsForWidth=w=>w>=980?1:w>=560?2:3;

  function build(){
    shelves.innerHTML='';
    var W=window.innerWidth, mobile=W<640, R=rowsForWidth(W);
    // 按书脊厚度均衡拆成 R 行（连续分组）
    var totalSp=BOOKS.reduce((s,b)=>s+b.sp,0), target=totalSp/R;
    var rows=[], cur=[], curSum=0;
    BOOKS.forEach(b=>{ cur.push(b); curSum+=b.sp;
      if(rows.length<R-1 && curSum>=target){ rows.push(cur); cur=[]; curSum=0; } });
    if(cur.length) rows.push(cur);
    var gap=3, sidePad=Math.max(24,W*0.04)*2, LIFT=mobile?16:66;
    var area=document.querySelector('.dfbs-shelfwrap');
    var stageH=(area&&area.clientHeight)||g('dfbs-stage').clientHeight||600, avail=W-sidePad;
    var maxCh=Math.max.apply(null,BOOKS.map(b=>b.ch));
    var wScale=Math.min.apply(null,rows.map(r=>(avail-gap*(r.length-1))/r.reduce((s,b)=>s+b.sp,0)));
    var vgap=Math.max(18,stageH*0.04);
    var hScale=(stageH*0.9 - vgap*(R-1) - LIFT)/(R*maxCh);
    var scale=Math.min(wScale,hScale,2.4), idx=0;
    rows.forEach(function(rb){
      var shelf=document.createElement('div'); shelf.className='dfbs-shelf';
      rb.forEach(function(b){
        var X=Math.max(13,b.sp*scale), Y=b.ch*scale, Z=b.cw*scale;
        var cov=img(b.cover), spn=img(b.spine);
        var slot=document.createElement('div'); slot.className='slot';
        slot.style.width=X+'px'; slot.style.height=(Y+LIFT)+'px';
        var book=document.createElement('div'); book.className='book';
        book.style.cssText='--X:'+X+'px;--Y:'+Y+'px;--Z:'+Z+'px;animation-delay:'+(idx*46)+'ms';
        book.innerHTML=
          '<div class="face spine" style="background-color:'+b.g+';background-image:url(\''+encodeURI(spn)+'\')"></div>'+
          '<div class="face cover" style="background-color:'+b.g+';background-image:url(\''+encodeURI(cov)+'\')"></div>'+
          '<div class="face pback"></div><div class="face foreedge"></div><div class="face toppg"></div>';
        book.addEventListener('animationend',function(){book.classList.add('settled');},{once:true});
        book.addEventListener('click',function(e){e.stopPropagation();select(b,book);});
        slot.appendChild(book); shelf.appendChild(slot); idx++;
      });
      shelves.appendChild(shelf);
    });
  }

  var selEl=null;
  function select(b,el){
    if(selEl===el){ deselect(); return; }
    wrap.querySelectorAll('.book').forEach(x=>{x.classList.remove('sel');x.classList.add('dim');});
    el.classList.remove('dim'); el.classList.add('sel'); selEl=el;
    var dc=g('dw-cover'); dc.style.backgroundImage=`url('${encodeURI(img(b.cover))}')`; dc.style.height=(148*b.ch/b.cw)+'px';
    g('dw-era').textContent='上海 · '+b.era+'卷';
    g('dw-title').textContent=b.title;
    g('dw-author').textContent=b.author;
    g('dw-quote').innerHTML= b.quote?('「'+b.quote+'」'):'';
    g('dw-blurb').textContent=b.blurb||'';
    g('dw-bio').textContent= b.bio?('作者｜'+b.author+'　'+b.bio):'';
    g('dw-meta').innerHTML=`<div>编号<b>No.${String(b.no).padStart(3,'0')}</b></div>`+
      `<div>开本<b>${b.cw}×${b.ch}mm</b></div><div>书脊<b>${b.sp}mm</b></div>`;
    var s=DF_STORIES[b.no];
    if(s){
      g('dw-story-title').textContent='《'+s.work+'》';
      g('dw-story-desc').textContent=s.story||'';
      var st=g('dw-story'); st.href=s.url; st.textContent='跳转互动故事《'+s.work+'》 →';
      g('dw-storyblock').style.display='block';
    } else { g('dw-storyblock').style.display='none'; }
    wrap.classList.add('hasSel');
  }
  function deselect(){
    wrap.querySelectorAll('.book').forEach(x=>{x.classList.remove('sel');x.classList.remove('dim');});
    selEl=null; wrap.classList.remove('hasSel');
  }
  g('dfbs-backdrop').addEventListener('click',deselect);
  g('dfbs-close').addEventListener('click',deselect);

  window.addEventListener('keydown',e=>{
    if(!document.querySelector('.dfbs')) return;
    if(e.key==='Escape') deselect();
  });

  build();
  var t; window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(()=>{deselect();build();},180);});
})();
</script>
